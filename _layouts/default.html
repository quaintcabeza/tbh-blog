<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tangerine:wght@400;700&display=swap">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="wrapper">
        {% include nav.html %}
      </div>
    </header>
    <div class="site-banner">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </div>
    <main class="page-content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>
    <footer class="site-footer">
      <div class="wrapper">
        <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}</p>
      </div>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turbolinks/5.2.0/turbolinks.js"></script>
    <script>
      function positionMobileNav() {
        var header = document.querySelector('.site-header');
        var navLinks = document.querySelector('.nav-links');
        if (header && navLinks) {
          navLinks.style.top = header.getBoundingClientRect().bottom + 'px';
        }
      }

      document.getElementById('nav-trigger') && document.getElementById('nav-trigger').addEventListener('change', positionMobileNav);
      window.addEventListener('resize', positionMobileNav);

    </script>
  </body>
</html>
